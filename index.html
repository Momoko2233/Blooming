<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>つねに咲いて、つねに減る</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root{
            --text:#fafafa;
            --text-dim:rgba(250,250,250,.6);
            --serif:'Cormorant Garamond',Georgia,serif;
            --mono:'JetBrains Mono',monospace;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:var(--text);font-family:var(--serif);overflow:hidden;} /* 移除 cursor:none */
        
        /* ===== 视频容器 (居中内嵌) ===== */
        #video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            z-index: 1; /* 确保视频容器在加载层之下 */
            opacity: 0; /* 初始隐藏，加载完后淡入 */
            transition: opacity 1s ease;
        }

        /* ===== 让 YouTube iframe 全屏铺满容器 ===== */
        #video-wrapper iframe {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            border: none;
            outline: none;
        }

        /* ===== 加载动画层 ===== */
        .loader{
            position:fixed;inset:0;background:#000;z-index:10000; /* Z-index 很高，确保在最顶层 */
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            transition:transform 1.2s cubic-bezier(.77,0,.175,1);
        }
        .loader.done{transform:translateY(-100%)}
        
        /* 加载标题样式 (已修改) */
        .loader-logo{
            font-family:var(--serif);font-size:2rem;font-weight:300;
            letter-spacing:.5em;margin-bottom:3rem;opacity:1; /* 父元素设为1，交给子元素控制 */
        }

        /* 新增：每个字的初始状态和动画 */
        .loader-logo span {
            display: inline-block; /* 必须设置为行内块，否则滤镜动画可能不生效 */
            opacity: 0; /* 初始完全透明 */
            filter: blur(15px); /* 初始极度模糊 */
            animation: blurToClear 1.5s ease-out forwards; /* 调用下方定义的动画 */
        }

        /* 新增：从模糊到清晰的动画关键帧 */
        @keyframes blurToClear {
            0% {
                opacity: 0;
                filter: blur(15px);
                transform: scale(1.1); /* 稍微放大一点，增加动态感 */
            }
            100% {
                opacity: 1;
                filter: blur(0px);
                transform: scale(1);
            }
        }

        .loader-bar{width:280px;height:1px;background:rgba(255,255,255,.1);position:relative;overflow:hidden}
	.loader-progress{position:absolute;top:0;left:0;height:100%;width:0;background:#FF0040;transition:width .3s ease}
	.loader-count{font-family:var(--mono);font-size:.7rem;color:#FF0040;margin-top:1rem;letter-spacing:.2em}

        /* ===== 移除光标相关样式 ===== */

    </style>
</head>
<body>

    <!-- 1. 视频容器 (内嵌播放器) -->
    <div id="video-wrapper">
        <!-- 精简控件的 iframe 代码 -->
        <iframe 
            width="560" 
            height="315" 
            src="https://www.youtube.com/embed/n-Dnlme-jlE?si=Kmc0E6sek0c8HIKz&controls=1&modestbranding=1&rel=0" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>
    </div>

    <!-- 2. 加载动画层 -->
    <div class="loader">
        <!-- 文字已拆分为 span 标签，以便 JS 控制随机动画 -->
        <div class="loader-logo" id="loader-logo">
            <span>つ</span><span>ね</span><span>に</span><span>咲</span><span>い</span><span>て</span><span>、</span><span>つ</span><span>ね</span><span>に</span><span>減</span><span>る</span>
        </div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
        <div class="loader-count">0%</div>
    </div>

    <!-- 3. 移除光标元素 -->

    <script>
        // --- 随机文字模糊变清晰特效 ---
        const logoText = document.getElementById('loader-logo');
        if (logoText) {
            const chars = logoText.querySelectorAll('span');
            chars.forEach(char => {
                // 生成 0 到 2 秒之间的随机延迟时间
                const randomDelay = Math.random() * 2; 
                // 将随机延迟时间应用到每个字上
                char.style.animationDelay = `${randomDelay}s`;
            });
        }

        // --- 加载动画逻辑 ---
        window.addEventListener('load', () => {
            const loader = document.querySelector('.loader');
            const progress = document.querySelector('.loader-progress');
            const count = document.querySelector('.loader-count');
            const videoWrapper = document.getElementById('video-wrapper');
            
            let width = 0;
            
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    count.textContent = '100%';
                    setTimeout(() => {
                        // 1. 加载动画向上滑走
                        loader.classList.add('done');
                        
                        // 2. 视频容器淡入显示
                        videoWrapper.style.opacity = '1';
                        
                    }, 500);
                } else {
                    width++;
                    progress.style.width = width + '%';
                    count.textContent = width + '%';
                }
            }, 20); // 调整数字可改变加载速度
        });

        // --- 移除光标逻辑 ---

    </script>
</body>
</html>
